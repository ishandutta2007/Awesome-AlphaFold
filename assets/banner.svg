<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="helixGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>
  </defs>

  <style>
    .title {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 800;
      fill: url(#textGrad);
      letter-spacing: 2px;
    }
    .subtitle {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 400;
      fill: #94a3b8;
      letter-spacing: 4px;
    }
    .node {
      animation: pulse 3s ease-in-out infinite alternate;
    }
    .node:nth-child(2n) {
      animation-delay: -1.5s;
    }
    .helix-path {
      stroke: url(#helixGrad);
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: draw 8s linear infinite;
    }
    @keyframes pulse {
      0% { r: 6px; opacity: 0.5; fill: #6366f1; }
      100% { r: 12px; opacity: 0.9; fill: #14b8a6; }
    }
    @keyframes draw {
      to {
        stroke-dashoffset: 0;
      }
    }
    .glow {
      filter: drop-shadow(0px 0px 8px rgba(99, 102, 241, 0.6));
    }
  </style>

  <!-- Background -->
  <rect width="1200" height="400" rx="16" fill="url(#bgGrad)" />

  <!-- Animated Helix Elements -->
  <g class="glow" transform="translate(100, 50)">
    <!-- Simulated connecting lines -->
    <line x1="100" y1="100" x2="100" y2="300" stroke="#334155" stroke-width="2" stroke-dasharray="4,4" />
    <line x1="200" y1="120" x2="200" y2="280" stroke="#334155" stroke-width="2" stroke-dasharray="4,4" />
    <line x1="300" y1="180" x2="300" y2="220" stroke="#334155" stroke-width="2" stroke-dasharray="4,4" />
    <line x1="400" y1="280" x2="400" y2="120" stroke="#334155" stroke-width="2" stroke-dasharray="4,4" />
    <line x1="500" y1="300" x2="500" y2="100" stroke="#334155" stroke-width="2" stroke-dasharray="4,4" />

    <!-- Wave paths representing the double helix -->
    <path class="helix-path" d="M 50,150 Q 150,50 250,150 T 450,150 T 650,150" fill="none" stroke-width="4" />
    <path class="helix-path" d="M 50,250 Q 150,350 250,250 T 450,250 T 650,250" fill="none" stroke-width="4" style="animation-delay: -4s;" />

    <!-- Nodes representing base pairs -->
    <circle class="node" cx="100" cy="100" r="8" />
    <circle class="node" cx="100" cy="300" r="8" />
    <circle class="node" cx="200" cy="120" r="8" />
    <circle class="node" cx="200" cy="280" r="8" />
    <circle class="node" cx="300" cy="180" r="8" />
    <circle class="node" cx="300" cy="220" r="8" />
    <circle class="node" cx="400" cy="280" r="8" />
    <circle class="node" cx="400" cy="120" r="8" />
    <circle class="node" cx="500" cy="300" r="8" />
    <circle class="node" cx="500" cy="100" r="8" />
  </g>

  <!-- Typography -->
  <text x="650" y="200" font-size="64" class="title">AWESOME</text>
  <text x="650" y="260" font-size="54" class="title">ALPHAFOLD</text>
  <text x="650" y="310" font-size="18" class="subtitle">STRUCTURAL BIOLOGY MAP &amp; EVOLUTION</text>
</svg>
